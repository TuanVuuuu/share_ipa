<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt ứng dụng</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container install-zone">
    <h2>Cài đặt ứng dụng</h2>

    <div class="app-meta">
        <img src="https://cdn-icons-png.flaticon.com/512/5115/5115293.png" alt="App Icon" class="app-icon" id="install-icon">
        <div class="app-details">
            <h3 id="install-name">Đang tải thông tin bản build...</h3>
            <p id="install-bundle"></p>
            <p id="install-version"></p>
        </div>
    </div>

    <div class="install-meta" id="install-extra"></div>

    <hr class="divider">

    <a href="#" id="install-btn" class="btn install-btn">Cài đặt ngay</a>
    <p class="qr-hint" id="install-hint">Vui lòng mở trang này bằng iPhone/iPad để cài đặt.</p>
    <a href="/" class="btn secondary" id="install-back">Về trang chủ</a>
</div>

<script src="/js/install.js"></script>
</body>
</html>
