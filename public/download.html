<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo link tải — Share IPA</title>
    <!-- __OG_META__ -->
    <link rel="icon" type="image/png" href="/ic_launcher_web.png">
    <link rel="apple-touch-icon" href="/ic_launcher_web.png">
    <link rel="stylesheet" href="/css/styles.css?v=__V__">
</head>
<body>

<div class="container dl-page" id="download-page">
    <a href="/" class="catalog-back"><svg class="catalog-back-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/></svg>Trang chủ</a>

    <div id="list-view">
        <div class="catalog-head">
            <h2>Mục download</h2>
        </div>
        <p class="catalog-sub" id="list-sub">Chọn mục do admin tạo, gắn bản iOS/Android rồi lưu link gửi đối tác.</p>

        <div id="admin-product-form" class="dl-admin-form" style="display:none;">
            <h3 id="admin-form-title">Thêm mục download</h3>
            <div class="dl-pick-fields">
                <label class="dl-field">
                    <span class="dl-field-label">Tên mục</span>
                    <input type="text" id="product-name" class="dl-select" placeholder="Ví dụ: CIC Credit Connect" autocomplete="off">
                </label>
                <label class="dl-field">
                    <span class="dl-field-label"><span class="build-tag build-tag-ios">iOS</span> Bundle ID</span>
                    <input type="text" id="product-ios-bundle" class="dl-select" placeholder="com.example.app" autocomplete="off">
                </label>
                <label class="dl-field">
                    <span class="dl-field-label"><span class="build-tag build-tag-android">Android</span> Package name</span>
                    <input type="text" id="product-android-bundle" class="dl-select" placeholder="com.example.app" autocomplete="off">
                </label>
            </div>
            <div class="dl-admin-actions">
                <button type="button" class="btn" id="product-save-btn">Lưu mục</button>
                <button type="button" class="btn secondary" id="product-cancel-btn" style="display:none;">Hủy sửa</button>
            </div>
            <p class="dl-field-hint" id="admin-form-error"></p>
        </div>

        <div id="app-list" class="dl-app-list is-loading"></div>
        <div id="list-empty" class="catalog-empty" style="display:none;">Chưa có mục download. Admin hãy tạo mục mới ở trên.</div>
    </div>

    <div id="pick-view" style="display:none;">
        <button type="button" class="catalog-back" id="pick-back">← Quay lại danh sách</button>
        <div class="dl-pick-header">
            <img src="" alt="" class="dl-pick-icon" id="pick-icon">
            <div>
                <h2 id="pick-name">App</h2>
                <p class="catalog-sub" id="pick-sub">Chọn bản build để chia sẻ</p>
            </div>
        </div>

        <div class="dl-pick-fields">
            <label class="dl-field">
                <span class="dl-field-label"><span class="build-tag build-tag-ios">iOS</span> Phiên bản</span>
                <select id="ios-select" class="dl-select"></select>
                <p class="dl-field-hint" id="ios-hint"></p>
            </label>
            <label class="dl-field">
                <span class="dl-field-label"><span class="build-tag build-tag-android">Android</span> Phiên bản</span>
                <select id="android-select" class="dl-select"></select>
                <p class="dl-field-hint" id="android-hint"></p>
            </label>
        </div>

        <div class="dl-share-box">
            <button type="button" class="btn" id="save-share-btn">Lưu &amp; tạo link</button>
            <p class="dl-field-hint" id="save-share-hint"></p>
            <label for="share-link-input">Link vừa tạo</label>
            <div class="url-box">
                <input type="text" id="share-link-input" readonly value="">
                <button type="button" class="btn secondary" id="copy-share-btn">Sao chép</button>
            </div>
            <a href="#" id="open-share-btn" class="btn secondary disabled" target="_blank" rel="noopener">Mở trang đối tác</a>
        </div>

        <div class="dl-saved-section">
            <h3>Link đã lưu</h3>
            <div id="saved-shares" class="dl-saved-list"></div>
            <div id="saved-empty" class="catalog-empty" style="display:none;">Chưa có link nào được lưu cho mục này.</div>
        </div>
    </div>
</div>

<script src="/js/download.js?v=__V__"></script>
</body>
</html>
